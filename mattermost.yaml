name: mattermost
description: "Mattermost chat widget for gl1tch"
kind: tool
command: glitch-mattermost-chat
mode:
  trigger: /mattermost
  logo: MATTERMOST
  speaker: MATTERMOST
  exit_command: /exit
  on_activate: /channels
  slash_hint: "— open Mattermost chat"
  slash_commands:
    - cmd: /channels
      hint: list channels and DMs
    - cmd: /join
      hint: join a channel (/join general)
    - cmd: /who
      hint: show active channel
    - cmd: /clear
      hint: clear session
